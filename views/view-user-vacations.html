<div class="view-header">
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="view-icon" style="background-color: var(--primary); color: white; width: 48px; height: 48px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        </div>
        <div>
            <h2 class="view-title">Días de Vacaciones / Descanso</h2>
            <p class="view-subtitle">Consulta tus días disponibles y realiza solicitudes</p>
        </div>
    </div>
</div>

<div class="view-content">
    <div class="card bg-gradient-primary" style="max-width: 500px; margin: 20px auto; padding: 25px; border-radius: var(--radius-md); text-align: left;">
        <span class="text-muted" style="font-size: 0.9rem; opacity: 0.9; color: #fff !important;">Vacaciones Restantes</span>
        <h4 id="usr-vacations-val" style="margin: 5px 0 0 0; font-size: 1.8rem; font-weight: 700;">-- Días</h4>
        <span id="usr-vacations-status" style="font-size: 0.85rem; opacity: 0.9; display: block; margin-top: 5px;">Ninguna solicitud pendiente</span>
    </div>

    <div class="card" style="max-width: 500px; margin: 20px auto; padding: 25px;">
        <h4>Solicitar Descanso (Vacaciones)</h4>
        <form id="form-request-vacation" style="display: flex; flex-direction: column; gap: 15px; margin-top: 15px;">
            <div class="form-group">
                <label for="request-vacation-days">Días a solicitar</label>
                <input type="number" id="request-vacation-days" class="form-control" step="1" min="1" max="15" required style="display: none;">
            </div>
            
            <div class="form-group">
                <label for="request-vacation-date">Fecha de Inicio</label>
                <input type="date" id="request-vacation-date" class="form-control">
            </div>
            <div class="form-group">
                <label for="request-vacation-date-end">Fecha de Fin (Opcional)</label>
                <input type="date" id="request-vacation-date-end" class="form-control">
            </div>
            <button type="button" id="btn-add-vacation-date" class="btn-secondary" style="width: 100%;">Agregar Fechas</button>
            <div id="vacation-dates-list" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;"></div>
            
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%;">Enviar Solicitud de Descanso</button>
        </form>
    </div>
</div>
